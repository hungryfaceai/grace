<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Novel Title</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.8;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px 40px;
    }

    .novel p {
      margin: 0 0 1.2em;
      font-size: 1.1rem;
    }

    .novel p:first-child {
      text-indent: 0;
    }

    .copyright {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #333;
      font-size: 0.9rem;
      color: #ccc;
    }

    @media (max-width: 640px) {
      .page {
        padding: 40px 20px 30px;
      }

      .novel p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="novel">
      <p>Paste the full text of your novel here.</p>

      <p>Add the rest of your paragraphs below, one after another.</p>

      <p>This version is intentionally minimal: no title page, no navigation, no chapter list, only the text itself.</p>
    </section>

    <section class="copyright">
      <p>© 2026 Your Name. All rights reserved.</p>
    </section>
  </main>
</body>
</html>
